<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>이번 주 AI·Cloud·Infra 핵심 뉴스 50</title>
  <meta name="description" content="개발자와 엔지니어를 위한 AI, Cloud, Infra 주간 뉴스 브리핑" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' http: https: data:; connect-src 'self'; base-uri 'self'; form-action 'none'; object-src 'none'" />
  <link rel="stylesheet" href="styles.css?v=20260718-detail-action-legibility-v1" />
</head>
<body>
  <a class="skip-link" href="#mainContent">본문으로 건너뛰기</a>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>

  <header class="hero">
    <nav class="topbar" aria-label="사이트 메타데이터">
      <div class="brand">
        <span class="brand-mark">◇</span>
        <span>AI / Cloud / Infra Weekly</span>
      </div>
      <div class="meta-pills">
        <span id="topUpdatedBadge" class="pill pill-muted">최종 업데이트 확인 중</span>
      </div>
    </nav>

    <section class="hero-grid">
      <div>
        <p class="eyebrow">개발자·엔지니어 브리핑</p>
        <h1>이번 주 AI·Cloud·Infra 핵심 뉴스 50</h1>
        <p class="hero-copy">이번 주 AI·Cloud·Infra 핵심만 빠르게, 기술적 의미까지 한눈에.</p>
        <div class="hero-actions">
          <div class="action-group action-group-toggle" aria-label="Top 6 표시 제한">
            <span class="action-label">표시 제한</span>
            <button class="button button-primary toggle-button" id="mustKnowButton" aria-pressed="false" aria-controls="newsGrid">Top 6</button>
          </div>
          <div class="action-group action-group-view">
            <span class="action-label">보기 방식</span>
            <div class="view-toggle" role="radiogroup" aria-label="보기 방식">
              <button class="button view-button active" id="listViewButton" role="radio" aria-checked="true" tabindex="0" aria-controls="newsGrid">목록 보기</button>
              <button class="button view-button" id="cardViewButton" role="radio" aria-checked="false" tabindex="-1" aria-controls="newsGrid">카드 보기</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </header>

  <main id="mainContent" tabindex="-1">
    <section class="panel summary-panel" aria-label="주간 핵심 요약">
      <div class="section-heading">
        <p class="eyebrow">주간 핵심 요약</p>
      </div>
      <ul id="summaryList" class="summary-list" aria-busy="true"></ul>
    </section>

    <section class="panel deep-dive-panel" aria-label="딥다이브">
      <div class="section-heading inline-heading">
        <p class="eyebrow">딥다이브</p>
      </div>
      <div id="deepDiveList" class="deep-dive-list" aria-busy="true"></div>
    </section>

    <section class="controls panel" aria-label="필터">
      <label class="search-wrap">
        <span>검색</span>
        <input id="searchInput" type="search" placeholder="제목, 요약, 태그, 출처, 시사점 검색" autocomplete="off" aria-controls="newsGrid" />
      </label>
      <div class="filter-sets" aria-label="태그 필터">
        <div class="filter-set">
          <span class="filter-label">주제</span>
          <div class="filter-group" aria-label="주제 필터" id="categoryFilters"></div>
        </div>
        <div class="filter-set">
          <span class="filter-label">중요도</span>
          <div class="filter-group" aria-label="중요도 필터" id="importanceFilters"></div>
        </div>
        <div class="filter-set">
          <span class="filter-label">지역</span>
          <div class="filter-group" aria-label="지역 필터" id="regionFilters"></div>
        </div>
      </div>
    </section>

    <section class="section-heading news-heading">
      <div>
        <p class="eyebrow">뉴스 리스트</p>
        <h2>주간 뉴스 리스트</h2>
      </div>
      <p id="resultText" class="hint" aria-live="polite" aria-atomic="true">-</p>
    </section>

    <section id="newsGrid" class="news-list" aria-label="필터링된 주간 뉴스" aria-busy="true"></section>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalSummary" aria-hidden="true">
    <div class="modal-backdrop" data-close="modal"></div>
    <article class="modal-card">
      <button class="modal-close" data-close="modal" aria-label="닫기">×</button>
      <img id="modalImage" class="modal-image" alt="" width="920" height="360" decoding="async" referrerpolicy="strict-origin-when-cross-origin" />
      <div class="modal-body">
        <div id="modalBadges" class="badges"></div>
        <h2><a id="modalTitle" class="modal-title-link" target="_blank" rel="noopener noreferrer" referrerpolicy="strict-origin-when-cross-origin"></a></h2>
        <p id="modalOriginal" class="original-title"></p>
        <p id="modalSummary" class="lead"></p>
        <div class="detail-block"><h3>상세 내용</h3><div id="modalDetail" class="rich-detail"></div></div>
        <div class="detail-block"><h3>왜 중요한가</h3><p id="modalWhy"></p></div>
        <div class="detail-block"><h3>시사점</h3><p id="modalEngineering"></p></div>
        <div id="modalLinks" class="modal-links"></div>
      </div>
    </article>
  </div>

  <template id="cardTemplate">
    <article class="news-card">
      <div class="image-wrap"><img class="card-image" alt="" width="336" height="252" loading="lazy" decoding="async" /></div>
      <div class="card-body">
        <div class="badges"></div>
        <h3></h3>
        <p class="original-title"></p>
        <p class="summary"></p>
        <p class="why"></p>
        <div class="card-footer">
          <a class="source source-link" target="_blank" rel="noopener noreferrer" referrerpolicy="strict-origin-when-cross-origin"></a>
          <span class="card-meta-right"><span class="read-state" aria-live="polite"></span><time class="published"></time><button class="card-detail-button" type="button" aria-haspopup="dialog">상세 보기</button></span>
        </div>
      </div>
    </article>
  </template>

  <script src="app.js?v=20260717-visible-kst-timestamps-v1"></script>
</body>
</html>
